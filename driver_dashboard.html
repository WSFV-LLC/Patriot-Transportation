
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Dashboard — Patriot Transportation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.header {
  background: #3d4c2a;
  color: white;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { 
  font-size: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.tab {
  padding: 12px 24px;
  background: white;
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
}
.tab.active {
  background: #3d4c2a;
  color: white;
  border-color: #3d4c2a;
}
.request-card {
  background: white;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.request-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid #f0f0f0;
}
.client-name {
  font-size: 20px;
  font-weight: 600;
  color: #3d4c2a;
}
.status-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}
.status-pending { background: #fff3cd; color: #856404; }
.status-quoted { background: #d1ecf1; color: #0c5460; }
.status-confirmed { background: #d4edda; color: #155724; }
.status-completed { background: #cce5ff; color: #004085; }
.status-declined { background: #f8d7da; color: #721c24; }
.status-cancelled { background: #f8d7da; color: #721c24; }
.status-paid { background: #c3e6cb; color: #1e7e34; }
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.detail-item {
  padding: 8px;
  background: #f8f9fa;
  border-radius: 4px;
}
.detail-label {
  font-size: 11px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.detail-value {
  font-size: 14px;
  font-weight: 600;
  color: #333;
}
.bid-section {
  background: #f8f9fa;
  border: 2px solid #3d4c2a;
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 16px;
}
.bid-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.bid-label { font-weight: 600; color: #666; }
.bid-amount {
  font-size: 24px;
  font-weight: bold;
  color: #3d4c2a;
}
.counter-input {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 12px;
}
.counter-input input {
  flex: 1;
  padding: 10px;
  border: 2px solid #3d4c2a;
  border-radius: 4px;
  font-size: 16px;
  font-weight: 600;
}
.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 14px;
}
.btn-accept { background: #28a745; color: white; }
.btn-accept:hover { background: #218838; }
.btn-counter { background: #ffc107; color: #333; }
.btn-counter:hover { background: #e0a800; }
.btn-deny { background: #b71c1c; color: white; }
.btn-deny:hover { background: #8b0000; }
.btn-paid { background: #28a745; color: white; }
.btn-paid:hover { background: #218838; }
.btn-receipt { background: #6c757d; color: white; }
.btn-receipt:hover { background: #5a6268; }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #999;
}
.calendar-view {
  background: white;
  border-radius: 8px;
  padding: 20px;
}
.loading {
  text-align: center;
  padding: 40px;
  color: #666;
}
.client-card {
  background: #f8f9fa;
  padding: 16px;
  border-radius: 6px;
  margin-bottom: 12px;
  border-left: 4px solid #3d4c2a;
  cursor: pointer;
  transition: all 0.3s;
}
.client-card:hover {
  background: #e9ecef;
  transform: translateX(4px);
}
.balance-badge {
  background: #dc3545;
  color: white;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}
.balance-badge.paid {
  background: #28a745;
}
.back-btn {
  background: #6c757d;
  color: white;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  margin-bottom: 16px;
}
.back-btn:hover {
  background: #5a6268;
}
</style>
</head>
<body>

<div class="header">
  <h1>Driver Dashboard</h1>
  <div style="font-size:14px;">Patriot Transportation</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('pending')">Pending Requests</div>
  <div class="tab" onclick="showTab('quoted')">Quoted</div>
  <div class="tab" onclick="showTab('confirmed')">Confirmed</div>
  <div class="tab" onclick="showTab('completed')">Completed</div>
  <div class="tab" onclick="showTab('cancelled')">Cancelled</div>
  <div class="tab" onclick="showTab('clients')">Clients</div>
  <div class="tab" onclick="showTab('calendar')">Calendar</div>
</div>

<div id="pending-tab">
  <div id="pending-requests" class="loading">Loading...</div>
</div>

<div id="quoted-tab" style="display:none;">
  <div id="quoted-requests" class="loading">Loading...</div>
</div>

<div id="confirmed-tab" style="display:none;">
  <div id="confirmed-requests" class="loading">Loading...</div>
</div>

<div id="completed-tab" style="display:none;">
  <div id="completed-requests" class="loading">Loading...</div>
</div>

<div id="cancelled-tab" style="display:none;">
  <div id="cancelled-requests" class="loading">Loading...</div>
</div>

<div id="clients-tab" style="display:none;">
  <div class="calendar-view">
    <div id="clients-list-view">
      <h2 style="margin-bottom:16px; color:#3d4c2a;">All Clients</h2>
      <input type="text" id="client-search" placeholder="Search by name or phone..." style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:6px; margin-bottom:16px; font-size:15px;">
      <div id="clients-list" class="loading">Loading...</div>
    </div>
    <div id="client-detail-view" style="display:none;">
      <!-- Client detail view will be populated here -->
    </div>
  </div>
</div>

<div id="calendar-tab" style="display:none;">
  <div class="calendar-view">
    <h2 style="margin-bottom:16px; color:#3d4c2a;">Upcoming Rides</h2>
    <div id="calendar-view" class="loading">Loading...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCU5gio9iuDF1wkY8lRJVN0ULHQxgujluM",
  authDomain: "patriot-transportation.firebaseapp.com",
  projectId: "patriot-transportation",
  storageBucket: "patriot-transportation.firebasestorage.app",
  messagingSenderId: "296569517357",
  appId: "1:296569517357:web:61b82f2d2310c3bf5bcfa4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.updateDoc = updateDoc;
window.doc = doc;
window.deleteDoc = deleteDoc;
window.getDoc = getDoc;
window.query = query;
window.collection = collection;
window.where = where;
window.orderBy = orderBy;
window.onSnapshot = onSnapshot;

// Load pending requests
const pendingQuery = query(collection(db, 'ride_requests'), where('status', '==', 'pending'), orderBy('created_at', 'desc'));
onSnapshot(pendingQuery, (snapshot) => {
  displayRequests(snapshot, 'pending-requests');
});

// Load quoted requests
const quotedQuery = query(collection(db, 'ride_requests'), where('status', '==', 'quoted'), orderBy('created_at', 'desc'));
onSnapshot(quotedQuery, (snapshot) => {
  displayRequests(snapshot, 'quoted-requests');
});

// Load confirmed requests
const confirmedQuery = query(collection(db, 'ride_requests'), where('status', '==', 'confirmed'), orderBy('pickup_date', 'asc'));
onSnapshot(confirmedQuery, (snapshot) => {
  displayRequests(snapshot, 'confirmed-requests');
  displayCalendar(snapshot);
});

// Load completed requests (both completed and paid)
const completedQuery = query(collection(db, 'ride_requests'), where('status', 'in', ['completed', 'paid']), orderBy('pickup_date', 'desc'));
onSnapshot(completedQuery, (snapshot) => {
  displayRequests(snapshot, 'completed-requests');
});

// Load cancelled requests
const cancelledQuery = query(collection(db, 'ride_requests'), where('status', '==', 'cancelled'), orderBy('created_at', 'desc'));
onSnapshot(cancelledQuery, (snapshot) => {
  displayRequests(snapshot, 'cancelled-requests');
});

function displayRequests(snapshot, containerId) {
  const container = document.getElementById(containerId);
  
  if (snapshot.empty) {
    container.innerHTML = '<div class="empty-state">No requests yet</div>';
    return;
  }

  container.innerHTML = '';
  snapshot.forEach((doc) => {
    const data = doc.data();
    container.innerHTML += createRequestCard(doc.id, data);
  });
}

function displayCalendar(snapshot) {
  const container = document.getElementById('calendar-view');
  
  if (snapshot.empty) {
    container.innerHTML = '<div class="empty-state">No upcoming rides</div>';
    return;
  }

  let html = '';
  snapshot.forEach((doc) => {
    const data = doc.data();
    html += `
      <div style="padding:12px; border-left:4px solid #3d4c2a; margin-bottom:12px; background:#f8f9fa;">
        <div style="font-weight:600; color:#3d4c2a;">${data.pickup_date} at ${data.pickup_time}</div>
        <div style="font-size:14px; color:#666; margin-top:4px;">${data.client_name} • ${data.pickup_address} → ${data.dropoff_address}</div>
        <div style="font-size:14px; color:#3d4c2a; font-weight:600; margin-top:4px;">$${data.final_price || data.client_bid}</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function createRequestCard(id, data) {
  const statusClass = `status-${data.status}`;
  
  let actionButtons = '';
  
  if (data.status === 'pending') {
    actionButtons = `
      <div class="counter-input">
        <span style="font-weight:600;">Counter offer: $</span>
        <input type="number" id="counter-${id}" placeholder="Enter amount" min="1" step="0.01">
      </div>
      <div class="actions" style="margin-top:12px;">
        <button class="btn btn-accept" onclick="acceptBid('${id}', ${data.client_bid})">Accept Their Bid ($${data.client_bid})</button>
        <button class="btn btn-counter" onclick="counterOffer('${id}')">Send Counter Offer</button>
        <button class="btn btn-deny" onclick="denyRequest('${id}')">Deny Request</button>
      </div>
    `;
  } else if (data.status === 'quoted') {
    actionButtons = `
      <div class="actions">
        <button class="btn btn-accept" onclick="acceptOnBehalf('${id}')">Accept on Client's Behalf</button>
        <button class="btn btn-deny" onclick="cancelRide('${id}')">Cancel Quote</button>
      </div>
    `;
  } else if (data.status === 'confirmed') {
    actionButtons = `
      <div class="actions">
        <button class="btn btn-paid" onclick="markAsComplete('${id}')">Ride Complete</button>
        <button class="btn btn-deny" onclick="cancelRide('${id}')">Cancel Ride</button>
      </div>
    `;
  } else if (data.status === 'completed') {
    actionButtons = `
      <div class="actions">
        <button class="btn btn-paid" onclick="markAsPaid('${id}')">Mark as Paid</button>
        <button class="btn btn-deny" onclick="cancelRide('${id}')">Cancel Ride</button>
      </div>
    `;
  } else if (data.status === 'paid') {
    actionButtons = `
      <div class="actions">
        <button class="btn btn-receipt" onclick="generateReceipt('${id}')">View Receipt</button>
        <button class="btn btn-deny" onclick="deleteRide('${id}')">Delete</button>
      </div>
    `;
  } else if (data.status === 'cancelled') {
    actionButtons = `
      <div class="actions">
        <button class="btn btn-accept" onclick="restoreRide('${id}')">Restore to Confirmed</button>
        <button class="btn btn-deny" onclick="deleteRide('${id}')">Delete</button>
      </div>
    `;
  }

  return `
    <div class="request-card">
      <div class="request-header">
        <div class="client-name">${data.client_name}</div>
        <div class="status-badge ${statusClass}">${data.status}</div>
      </div>
      
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-label">Phone</div>
          <div class="detail-value">${data.client_phone}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Email</div>
          <div class="detail-value">${data.client_email}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Date & Time</div>
          <div class="detail-value">${data.pickup_date} at ${data.pickup_time}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Passengers</div>
          <div class="detail-value">${data.passengers} passengers</div>
        </div>
      </div>

      <div class="detail-item" style="margin-bottom:12px;">
        <div class="detail-label">Route</div>
        <div class="detail-value">${data.pickup_address} → ${data.dropoff_address}</div>
      </div>

      <div class="detail-item" style="margin-bottom:12px;">
        <div class="detail-label">Luggage</div>
        <div class="detail-value">${data.luggage_type}</div>
      </div>

      ${data.notes ? `<div class="detail-item" style="margin-bottom:12px;">
        <div class="detail-label">Notes</div>
        <div class="detail-value">${data.notes}</div>
      </div>` : ''}

      <div class="bid-section">
        <div class="bid-row">
          <span class="bid-label">Uber Comfort Estimate:</span>
          <span style="font-size:18px; font-weight:600;">$${data.uber_estimate?.toFixed(2) || '0.00'}</span>
        </div>
        <div class="bid-row">
          <span class="bid-label">Client's Offer:</span>
          <span class="bid-amount">$${data.client_bid?.toFixed(2) || '0.00'}</span>
        </div>
        ${data.counter_offer ? `<div class="bid-row">
          <span class="bid-label">Your Counter:</span>
          <span style="font-size:18px; font-weight:600; color:#ffc107;">$${data.counter_offer.toFixed(2)}</span>
        </div>` : ''}
        ${data.final_price ? `<div class="bid-row">
          <span class="bid-label">Final Price:</span>
          <span class="bid-amount">$${data.final_price.toFixed(2)}</span>
        </div>` : ''}
      </div>

      ${actionButtons}
    </div>
  `;
}

window.createRequestCard = createRequestCard;
</script>

<script>
let currentTab = 'pending';
let allClientsData = null;

function showTab(tab) {
  currentTab = tab;
  
  // Hide all tabs
  document.getElementById('pending-tab').style.display = 'none';
  document.getElementById('quoted-tab').style.display = 'none';
  document.getElementById('confirmed-tab').style.display = 'none';
  document.getElementById('completed-tab').style.display = 'none';
  document.getElementById('cancelled-tab').style.display = 'none';
  document.getElementById('clients-tab').style.display = 'none';
  document.getElementById('calendar-tab').style.display = 'none';
  
  // Show selected tab
  document.getElementById(tab + '-tab').style.display = 'block';
  
  // Update tab styling
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  // Load clients if switching to clients tab
  if (tab === 'clients') {
    loadClients();
  }
}

async function acceptBid(id, amount) {
  if (!confirm(`Accept client's bid of $${amount.toFixed(2)}? This will confirm the booking.`)) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'confirmed',
      final_price: amount,
      quoted_at: new Date(),
      confirmed_at: new Date()
    });
    
    // Try to send to Make.com for calendar, but don't let it break the confirmation
    try {
      const rideDoc = await window.getDoc(window.doc(window.db, 'ride_requests', id));
      const rideData = rideDoc.data();
      
      fetch('https://hook.us2.make.com/zlo5peda4fwlrz2nk7m1hakc4dxjblw1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...rideData,
          final_price: amount,
          ride_id: id
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.event_id) {
          window.updateDoc(window.doc(window.db, 'ride_requests', id), {
            calendar_event_id: data.event_id
          }).catch(err => console.log('Error saving event ID:', err));
        }
      })
      .catch(err => console.log('Calendar webhook error:', err));
    } catch (err) {
      console.log('Error fetching ride data:', err);
    }
    
    alert('Bid accepted and booking confirmed!');
  } catch (error) {
    alert('Error accepting bid: ' + error.message);
  }
}

async function counterOffer(id) {
  const input = document.getElementById('counter-' + id);
  const amount = parseFloat(input.value);
  
  if (!amount || amount < 1) {
    alert('Please enter a valid counter offer amount');
    return;
  }
  
  if (!confirm(`Send counter offer of $${amount.toFixed(2)}?`)) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'quoted',
      counter_offer: amount,
      final_price: amount,
      quoted_at: new Date()
    });
    alert('Counter offer sent! Client will be notified.');
  } catch (error) {
    alert('Error sending counter offer: ' + error.message);
  }
}

async function denyRequest(id) {
  if (!confirm('Are you sure you want to deny this request?')) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'declined',
      declined_at: new Date()
    });
    alert('Request denied. Client will be notified.');
  } catch (error) {
    alert('Error denying request: ' + error.message);
  }
}

async function markAsComplete(id) {
  if (!confirm('Mark this ride as complete (not yet paid)?')) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'completed',
      completed_at: new Date()
    });
    alert('Marked as complete!');
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

async function markAsPaid(id) {
  if (!confirm('Mark this ride as paid?')) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'paid',
      paid_at: new Date()
    });
    alert('Marked as paid!');
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

async function cancelRide(id) {
  if (!confirm('Are you sure you want to cancel this ride?')) return;
  
  try {
    // Get the ride data first to get calendar event ID
    const rideDoc = await window.getDoc(window.doc(window.db, 'ride_requests', id));
    const rideData = rideDoc.data();
    
    // Update status to cancelled
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'cancelled',
      cancelled_at: new Date(),
      cancelled_by: 'driver'
    });
    
    // If there's a calendar event, send webhook to delete it
    if (rideData.calendar_event_id) {
      fetch('https://hook.us2.make.com/zlo5peda4fwlrz2nk7m1hakc4dxjblw1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'delete',
          event_id: rideData.calendar_event_id
        })
      }).catch(err => console.log('Delete calendar error:', err));
    }
    
    alert('Ride cancelled.');
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

async function deleteRide(id) {
  if (!confirm('Permanently delete this ride? This cannot be undone.')) return;
  
  try {
    await window.deleteDoc(window.doc(window.db, 'ride_requests', id));
    alert('Ride deleted.');
  } catch (error) {
    alert('Error deleting: ' + error.message);
  }
}

async function restoreRide(id) {
  if (!confirm('Restore this ride to confirmed status?')) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'confirmed',
      restored_at: new Date()
    });
    alert('Ride restored to confirmed!');
  } catch (error) {
    alert('Error restoring: ' + error.message);
  }
}

async function acceptOnBehalf(id) {
  if (!confirm('Confirm this ride on behalf of the client?')) return;
  
  try {
    await window.updateDoc(window.doc(window.db, 'ride_requests', id), {
      status: 'confirmed',
      confirmed_at: new Date(),
      confirmed_by: 'driver'
    });
    
    // Try to send to Make.com for calendar, but don't let it break the confirmation
    try {
      const rideDoc = await window.getDoc(window.doc(window.db, 'ride_requests', id));
      const rideData = rideDoc.data();
      
      fetch('https://hook.us2.make.com/zlo5peda4fwlrz2nk7m1hakc4dxjblw1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...rideData,
          ride_id: id
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.event_id) {
          window.updateDoc(window.doc(window.db, 'ride_requests', id), {
            calendar_event_id: data.event_id
          }).catch(err => console.log('Error saving event ID:', err));
        }
      })
      .catch(err => console.log('Calendar webhook error:', err));
    } catch (err) {
      console.log('Error fetching ride data:', err);
    }
    
    alert('Ride confirmed!');
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

function loadClients() {
  const allRidesQuery = window.query(window.collection(window.db, 'ride_requests'), window.orderBy('created_at', 'desc'));
  
  window.onSnapshot(allRidesQuery, (snapshot) => {
    const clientsMap = new Map();
    
    snapshot.forEach((doc) => {
      const data = doc.data();
      const phone = data.client_phone;
      
      if (!clientsMap.has(phone)) {
        clientsMap.set(phone, {
          name: data.client_name,
          phone: phone,
          email: data.client_email,
          totalRides: 0,
          balanceDue: 0,
          rides: []
        });
      }
      
      const client = clientsMap.get(phone);
      client.totalRides++;
      client.rides.push({id: doc.id, ...data});
      
      // Calculate balance due (completed but not paid)
      if (data.status === 'completed' && data.final_price) {
        client.balanceDue += data.final_price;
      }
    });
    
    allClientsData = Array.from(clientsMap.values());
    displayClients(allClientsData);
  });
}

function displayClients(clients) {
  const container = document.getElementById('clients-list');
  const searchTerm = document.getElementById('client-search').value.toLowerCase();
  
  const filteredClients = clients.filter(client => 
    client.name.toLowerCase().includes(searchTerm) ||
    client.phone.includes(searchTerm)
  );
  
  if (filteredClients.length === 0) {
    container.innerHTML = '<div class="empty-state">No clients found</div>';
    return;
  }
  
  let html = '';
  filteredClients.forEach(client => {
    const balanceClass = client.balanceDue > 0 ? '' : 'paid';
    const balanceText = client.balanceDue > 0 ? `Due: $${client.balanceDue.toFixed(2)}` : 'Paid Up';
    
    html += `
      <div class="client-card" onclick="viewClientDetail('${client.phone}')">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-weight:600; font-size:16px; color:#3d4c2a;">${client.name}</div>
            <div style="font-size:14px; color:#666; margin-top:4px;">${client.phone} • ${client.email}</div>
          </div>
          <div style="text-align:right;">
            <div class="balance-badge ${balanceClass}">${balanceText}</div>
            <div style="font-size:12px; color:#999; margin-top:4px;">Total Rides: ${client.totalRides}</div>
          </div>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function viewClientDetail(phone) {
  const client = allClientsData.find(c => c.phone === phone);
  if (!client) return;
  
  // Hide list, show detail
  document.getElementById('clients-list-view').style.display = 'none';
  document.getElementById('client-detail-view').style.display = 'block';
  
  // Sort rides by date, most recent first
  const sortedRides = client.rides.sort((a, b) => {
    const dateA = new Date(a.pickup_date || 0);
    const dateB = new Date(b.pickup_date || 0);
    return dateB - dateA;
  });
  
  let ridesHtml = '';
  sortedRides.forEach(ride => {
    const statusClass = `status-${ride.status}`;
    const price = ride.final_price || ride.client_bid || 0;
    const isPending = ride.status === 'completed';
    
    ridesHtml += `
      <div class="request-card" style="margin-bottom:12px;">
        <div class="request-header">
          <div style="font-weight:600; color:#3d4c2a;">${ride.pickup_date} at ${ride.pickup_time}</div>
          <div class="status-badge ${statusClass}">${ride.status}</div>
        </div>
        <div style="font-size:14px; color:#666; margin-top:8px;">${ride.pickup_address} → ${ride.dropoff_address}</div>
        <div style="font-size:18px; font-weight:600; color:${isPending ? '#dc3545' : '#28a745'}; margin-top:8px;">
          $${price.toFixed(2)} ${isPending ? '(Unpaid)' : ''}
        </div>
      </div>
    `;
  });
  
  const balanceColor = client.balanceDue > 0 ? '#dc3545' : '#28a745';
  const balanceText = client.balanceDue > 0 ? `Balance Due: $${client.balanceDue.toFixed(2)}` : 'All Paid Up!';
  
  document.getElementById('client-detail-view').innerHTML = `
    <button class="back-btn" onclick="backToClientsList()">← Back to Clients</button>
    <div style="background:#f8f9fa; padding:20px; border-radius:8px; margin-bottom:20px;">
      <h2 style="color:#3d4c2a; margin-bottom:8px;">${client.name}</h2>
      <div style="color:#666; margin-bottom:16px;">${client.phone} • ${client.email}</div>
      <div style="display:flex; gap:20px; flex-wrap:wrap;">
        <div>
          <div style="font-size:12px; color:#666;">Total Rides</div>
          <div style="font-size:24px; font-weight:600; color:#3d4c2a;">${client.totalRides}</div>
        </div>
        <div>
          <div style="font-size:12px; color:#666;">Balance</div>
          <div style="font-size:24px; font-weight:600; color:${balanceColor};">${balanceText}</div>
        </div>
      </div>
    </div>
    <h3 style="margin-bottom:12px; color:#3d4c2a;">Ride History</h3>
    ${ridesHtml}
  `;
}

function backToClientsList() {
  document.getElementById('clients-list-view').style.display = 'block';
  document.getElementById('client-detail-view').style.display = 'none';
}

// Add search listener
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('client-search');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      if (currentTab === 'clients' && allClientsData) {
        displayClients(allClientsData);
      }
    });
  }
});

function generateReceipt(id) {
  window.open(`receipt.html?id=${id}`, '_blank');
}
</script>
